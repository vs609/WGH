<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра Кальмара</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  background:#050510;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}
.container{
  width:100%;
  max-width:1100px;
  background:#0d0d1f;
  border:2px solid #00f7ff;
  border-radius:24px;
  padding:30px;
  box-shadow:0 0 35px rgba(0,247,255,0.35);
}
h1{
  text-align:center;
  font-size:42px;
  color:#00f7ff;
  text-shadow:0 0 20px #00f7ff;
  margin-bottom:25px;
}
.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}
.wheel-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  margin-bottom:30px;
}
.pointer{
  position:absolute;
  top:-10px;
  width:0;
  height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-top:35px solid #ff00cc;
  filter:drop-shadow(0 0 10px #ff00cc);
  z-index:5;
}
.wheel{
  width:420px;
  height:420px;
  border-radius:50%;
  border:6px solid #00f7ff;
  box-shadow:0 0 30px #00f7ff;
  background: conic-gradient(
    #00f7ff 0deg 360deg
  );
  transition:transform 4s cubic-bezier(.17,.67,.15,1);
}
.players{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,247,255,0.35);
  border-radius:18px;
  padding:20px;
  text-align:center;
}
.card h2{
  margin-bottom:12px;
  color:#00f7ff;
}
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  text-align:center;
  font-size:16px;
}
button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#00f7ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px #00f7ff;
}
button:hover{transform:scale(1.02);}
.result{
  margin-top:25px;
  text-align:center;
  font-size:24px;
  min-height:40px;
}
.bank{
  text-align:center;
  margin-top:15px;
  font-size:20px;
  color:#ffd000;
}
</style>
</head>
<body>
<div class="container">
  <h1>ИГРА КАЛЬМАРА</h1>
  <div class="subtitle">MRKT style • Neon TON Game</div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
  </div>

  <div class="bank" id="bank">Общий банк: 0 TON</div>
  <div class="bank" id="chance">Площадь: Игрок 1 🔵 — 100% | Игрок 2 🔴 — 0%</div>

  <div class="players">
    <div class="card">
      <h2 style="color:#00f7ff;">Игрок 1 🔵</h2>
      <input id="bet1" type="number" min="1" placeholder="Ставка TON">
    </div>

    <div class="card">
      <h2 style="color:#ff4d4d;">Игрок 2 🔴</h2>
      <input id="bet2" type="number" min="1" placeholder="Ставка TON">
    </div>

    <div class="card">
      <h2>Запуск</h2>
      <button disabled>Ожидание ставок...</button>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
let currentRotation = 0;

function autoStartCheck() {
  const bet1 = parseInt(document.getElementById('bet1').value) || 0;
  const bet2 = parseInt(document.getElementById('bet2').value) || 0;

  if (bet1 > 0 && bet2 > 0) {
    spinWheel();
  }
}

document.getElementById('bet1').addEventListener('input', autoStartCheck);
document.getElementById('bet2').addEventListener('input', autoStartCheck);

function spinWheel(){
  const bet1 = parseInt(document.getElementById('bet1').value) || 0;
  const bet2 = parseInt(document.getElementById('bet2').value) || 0;
  const total = bet1 + bet2;

  document.getElementById('bank').textContent = `Общий банк: ${total} TON`;

  const chance1 = (bet1 / total) * 360;

  document.getElementById('wheel').style.background = `conic-gradient(
    #00f7ff 0deg ${chance1}deg,
    #ff4d4d ${chance1}deg 360deg
  )`;

  const random = Math.random() * 360;
  let winner = random <= chance1 ? 1 : 2;

  const extraSpin = 1440 + Math.floor(Math.random() * 360);
  currentRotation += extraSpin;

  document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
  document.getElementById('result').textContent = 'Рулетка крутится...';

  setTimeout(()=>{
    document.getElementById('result').textContent = `Победил Игрок ${winner} • Забрал ${total} TON`;

    // СБРОС СТАВОК ПОСЛЕ ИГРЫ
    document.getElementById('bet1').value = '';
    document.getElementById('bet2').value = '';
    document.getElementById('bank').textContent = 'Общий банк: 0 TON';
    document.getElementById('chance').textContent = 'Площадь: Игрок 1 — 100% | Игрок 2 — 0%';
  },4200);
}
</script>
</body>
</html>
