а<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Lighting Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .neon-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        /* Neon Text Effect */
        .neon-text {
            font-size: 48px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff,
                0 0 40px #0ff,
                0 0 70px #0ff,
                0 0 80px #0ff,
                0 0 100px #0ff,
                0 0 150px #0ff;
            letter-spacing: 2px;
            animation: neon-flicker 2s infinite;
        }

        .neon-text.pink {
            color: #ff006e;
            text-shadow: 
                0 0 10px #ff006e,
                0 0 20px #ff006e,
                0 0 30px #ff006e,
                0 0 40px #ff006e,
                0 0 70px #ff006e,
                0 0 80px #ff006e,
                0 0 100px #ff006e;
        }

        .neon-text.purple {
            color: #b537f2;
            text-shadow: 
                0 0 10px #b537f2,
                0 0 20px #b537f2,
                0 0 30px #b537f2,
                0 0 40px #b537f2,
                0 0 70px #b537f2,
                0 0 80px #b537f2,
                0 0 100px #b537f2;
        }

        /* Neon Box Effect */
        .neon-box {
            width: 200px;
            height: 200px;
            border: 3px solid #0ff;
            box-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff,
                inset 0 0 10px rgba(0, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: neon-glow 2s ease-in-out infinite;
        }

        .neon-box.pink {
            border-color: #ff006e;
            box-shadow: 
                0 0 10px #ff006e,
                0 0 20px #ff006e,
                0 0 30px #ff006e,
                inset 0 0 10px rgba(255, 0, 110, 0.1);
        }

        /* Neon Button */
        .neon-button {
            padding: 12px 30px;
            font-size: 16px;
            color: #0ff;
            background: transparent;
            border: 2px solid #0ff;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .neon-button:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px #0ff, inset 0 0 10px rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .neon-button:active {
            transform: scale(0.98);
        }

        /* Animations */
        @keyframes neon-flicker {
            0%, 100% {
                text-shadow: 
                    0 0 10px #0ff,
                    0 0 20px #0ff,
                    0 0 30px #0ff,
                    0 0 40px #0ff,
                    0 0 70px #0ff,
                    0 0 80px #0ff,
                    0 0 100px #0ff,
                    0 0 150px #0ff;
            }
            50% {
                text-shadow: 
                    0 0 5px #0ff,
                    0 0 10px #0ff,
                    0 0 15px #0ff,
                    0 0 20px #0ff,
                    0 0 35px #0ff,
                    0 0 40px #0ff,
                    0 0 50px #0ff,
                    0 0 75px #0ff;
            }
        }

        @keyframes neon-glow {
            0%, 100% {
                box-shadow: 
                    0 0 10px #0ff,
                    0 0 20px #0ff,
                    0 0 30px #0ff,
                    inset 0 0 10px rgba(0, 255, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 20px #0ff,
                    0 0 40px #0ff,
                    0 0 60px #0ff,
                    inset 0 0 20px rgba(0, 255, 255, 0.2);
            }
        }

        .demo-text {
            color: #0ff;
            font-size: 14px;
            margin-top: 30px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="neon-container">
        <h1 class="neon-text">NEON</h1>
        <h2 class="neon-text pink">EFFECT</h2>
        <h3 class="neon-text purple">Demo</h3>
        
        <div class="neon-box"></div>
        
        <button class="neon-button">Click Me</button>
        
        <p class="demo-text">Неоновое свечение</p>
    </div>
</body>
</html>
