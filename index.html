<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Wheel Casino Game</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .roulette {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 20px solid #444;
            position: relative;
            animation: spin 5s ease-in-out infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .neon {
            text-shadow:
                0 0 5px #0ff,
                0 0 10px #0ff,
                0 0 15px #0ff,
                0 0 20px #ff8c00;
        }
    </style>
</head>
<body>
    <h1 class='neon'>Roulette Wheel</h1>
    <div class='roulette' id='roulette'></div>
    <input type='number' id='bet' placeholder='Place your bet' />
    <button id='spinButton'>Spin the Wheel!</button>
    <p id='result'></p>
    <script>
        const spinButton = document.getElementById('spinButton');
        const resultText = document.getElementById('result');
        let betAmount;

        spinButton.addEventListener('click', () => {
            betAmount = document.getElementById('bet').value;
            if(betAmount <= 0) {
                alert('Please place a valid bet.');
                return;
            }
            const winningNumber = Math.floor(Math.random() * 37);
            resultText.innerText = `Winning Number: ${winningNumber}`;
            // Implement betting functionality here
        });
    </script>
</body>
</html>
