<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSG KASINO - Two-Player Roulette Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #39ff14;
            text-shadow: 0 0 20px #39ff14, 0 0 30px #39ff14, 0 0 40px #39ff14;
        }
        .roulette-game {
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #39ff14;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .bet {
            margin: 10px 0;
        }
        #spin-button {
            padding: 10px 20px;
            background-color: #39ff14;
            border: none;
            color: #000;
            font-size: 1.2em;
            cursor: pointer;
        }
        #winner {
            font-size: 2em;
            margin-top: 20px;
        }
        .arrow {
            display: none;
            margin: 20px auto;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 30px solid #39ff14;
        }
    </style>
</head>
<body>
    <h1>WSG KASINO</h1>
    <div class="roulette-game">
        <div class="bet">
            <input type="number" id="player1-bet" placeholder="Player 1 Bet" min="1">
            <input type="number" id="player2-bet" placeholder="Player 2 Bet" min="1">
        </div>
        <button id="spin-button">Spin the Wheel!</button>
        <div id="winner"></div>
        <div class="arrow" id="winner-arrow"></div>
    </div>
    <script>
        document.getElementById('spin-button').onclick = function() {
            const player1Bet = document.getElementById('player1-bet').value;
            const player2Bet = document.getElementById('player2-bet').value;

            if (!player1Bet || !player2Bet) {
                alert('Both players must place bets!');
                return;
            }

            const winner = Math.random() < 0.5 ? 'Player 1' : 'Player 2';
            document.getElementById('winner').textContent = `${winner} wins!`;
            document.getElementById('winner-arrow').style.display = 'block';
            if (winner === 'Player 1') {
                document.getElementById('winner-arrow').style.borderBottomColor = '#39ff14';
            } else {
                document.getElementById('winner-arrow').style.borderBottomColor = 'red';
            }
        };
    </script>
</body>
</html>
