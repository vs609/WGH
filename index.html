<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSG KASINO</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 3em;
            color: #39ff14;
            text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14;
            margin-bottom: 20px;
        }
        #wheel {
            width: 400px;
            height: 400px;
            border: 16px solid #333;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        .segment {
            width: 50%;
            height: 50%;
            position: absolute;
            transform-origin: 100% 100%;
        }
        .segment1 { background-color: #ff0000; transform: rotate(0deg); }
        .segment2 { background-color: #ff7f00; transform: rotate(45deg); }
        .segment3 { background-color: #ffff00; transform: rotate(90deg); }
        .segment4 { background-color: #7fff00; transform: rotate(135deg); }
        .segment5 { background-color: #00ff7f; transform: rotate(180deg); }
        .segment6 { background-color: #00ffff; transform: rotate(225deg); }
        .segment7 { background-color: #007fff; transform: rotate(270deg); }
        .segment8 { background-color: #0000ff; transform: rotate(315deg); }
        #spin {
            padding: 10px 20px;
            font-size: 1.5em;
            margin-top: 20px;
        }
        #result {
            margin-top: 20px;
            font-size: 1.5em;
        }
        #arrow {
            position: absolute;
            top: -20px;
            left: calc(50% - 10px);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid red;
        }
    </style>
</head>
<body>
    <h1>WSG KASINO</h1>
    <div id="wheel">
        <div class="segment segment1"></div>
        <div class="segment segment2"></div>
        <div class="segment segment3"></div>
        <div class="segment segment4"></div>
        <div class="segment segment5"></div>
        <div class="segment segment6"></div>
        <div class="segment segment7"></div>
        <div class="segment segment8"></div>
        <div id="arrow"></div>
    </div>
    <input type="number" id="bet" placeholder="Enter your bet" />
    <button id="spin">Spin</button>
    <div id="result"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const spinButton = document.getElementById('spin');
        const resultDiv = document.getElementById('result');
        let spinning = false;

        spinButton.addEventListener('click', () => {
            if (spinning) return;
            spinning = true;
            const bet = document.getElementById('bet').value;
            const segments = 8;
            const randomSegment = Math.floor(Math.random() * segments);
            const rotation = 360 * 3 + randomSegment * (360 / segments);
            wheel.style.transition = 'transform 4s ease-out';
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                resultDiv.innerText = `You landed on segment ${randomSegment + 1} with bet: $${bet}`;
                spinning = false;
                wheel.style.transition = 'none';
                wheel.style.transform = `rotate(${rotation % 360}deg)`;
            }, 4000);
        });
    </script>
</body>
</html>
