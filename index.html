<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSG Kasino - Neon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            padding-top: 50px;
        }

        .neon-container {
            position: relative;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Neon Text Effect */
        .neon-text {
            font-size: 64px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 30px #0ff,
                0 0 40px #0ff,
                0 0 70px #0ff,
                0 0 80px #0ff,
                0 0 100px #0ff,
                0 0 150px #0ff;
            letter-spacing: 3px;
            animation: neon-flicker 2s infinite;
        }

        .neon-text.pink {
            color: #ff006e;
            text-shadow: 
                0 0 10px #ff006e,
                0 0 20px #ff006e,
                0 0 30px #ff006e,
                0 0 40px #ff006e,
                0 0 70px #ff006e,
                0 0 80px #ff006e,
                0 0 100px #ff006e,
                0 0 150px #ff006e;
        }

        /* Animations */
        @keyframes neon-flicker {
            0%, 100% {
                text-shadow: 
                    0 0 10px #0ff,
                    0 0 20px #0ff,
                    0 0 30px #0ff,
                    0 0 40px #0ff,
                    0 0 70px #0ff,
                    0 0 80px #0ff,
                    0 0 100px #0ff,
                    0 0 150px #0ff;
            }
            50% {
                text-shadow: 
                    0 0 5px #0ff,
                    0 0 10px #0ff,
                    0 0 15px #0ff,
                    0 0 20px #0ff,
                    0 0 35px #0ff,
                    0 0 40px #0ff,
                    0 0 50px #0ff,
                    0 0 75px #0ff;
            }
        }
    </style>
</head>
<body>
    <div class="neon-container">
        <h1 class="neon-text">wsg</h1>
        <h2 class="neon-text pink">kasino</h2>
    </div>
</body>
</html>
